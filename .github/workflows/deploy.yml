name: Deploy Next.js site to Pages

on:
  # Runs on pushes targeting the main branch
  push:
    branches:
      - main

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          # Don't specify version here, to use the `packageManager` from `package.json`
          run_install: false

      # 2. Checkout original assets into folder /private
      - name: Checkout Private Assets
        uses: actions/checkout@v7
        with:
          repository: aimryoui/portfolio-assets
          token: ${{ secrets.ASSETS_PAT }}
          path: private

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      # 3. Install FFmpeg
      - name: Install FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          architecture: ""
          github-token: ${{ github.server_url == 'https://github.com' && github.token || '' }}

      - name: Setup Pages
        id: setup_pages
        uses: actions/configure-pages@v6

      - name: Cache Next.js
        uses: actions/cache@v6
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Cache Media (Videos & Images)
        uses: actions/cache@v6
        with:
          path: |
            public/assets/media
            src/lib/image-manifest.json
            src/lib/video-manifest.json
          key: ${{ runner.os }}-media-${{ hashFiles('private/media/**/*') }}-${{ hashFiles('**/*process-*.ts') }}
          restore-keys: |
            ${{ runner.os }}-media-

      - name: Build with Next.js
        run: pnpm run build
        env:
          NEXT_PUBLIC_BASE_URL: ${{ steps.setup_pages.outputs.origin }}
          PAGES_BASE_PATH: ${{ steps.setup_pages.outputs.base_path }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
